# ============================================================
# GitHub Actions: Build & Release — holamundo
#
# Se ejecuta automáticamente cuando creas un tag como v1.0.0
# También puedes lanzarlo a mano desde la pestaña "Actions"
# ============================================================

name: Build Installers

on:
  push:
    tags:
      - 'v*'          # Se dispara al hacer: git tag v1.0.0 && git push --tags
  workflow_dispatch:   # Permite lanzarlo a mano desde GitHub UI

jobs:

  # ──────────────────────────────────────────────────────────
  # 1) LINUX — genera .deb, .rpm y .sh
  #    Se ejecuta en un runner Ubuntu de GitHub
  # ──────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar el repositorio
        uses: actions/checkout@v4


      - name: Extraer versión del tag
        # Elimina la 'v' inicial: v1.2.3 → 1.2.3
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Instalar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'   # Eclipse Temurin = OpenJDK de confianza

      - name: Compilar y construir el JAR
        run: ./gradlew build

      # jpackage: herramienta oficial de Java para crear instaladores nativos
      # Viene incluida en el JDK 14+, no necesitas instalar nada extra

      - name: Crear instalador .deb (Debian/Ubuntu)
        run: |
          jpackage \
            --type deb \
            --name holamundo \
            --app-version ${{env.VERSION}} \
            --input build/libs \
            --main-jar holamundo-${{env.VERSION}}.jar \
            --main-class com.ejemplo.holamundo.Main \
            --dest build/installers/linux \
            --description "Aplicación Hola Mundo en Java" \
            --vendor "Mi Empresa" \
            --linux-shortcut

      - name: Crear instalador .rpm (RedHat/Fedora/CentOS)
        run: |
          # rpm-build es necesario para generar .rpm en Ubuntu
          sudo apt-get install -y rpm
          jpackage \
            --type rpm \
            --name holamundo \
            --app-version ${{env.VERSION}} \
            --input build/libs \
            --main-jar holamundo-${{env.VERSION}}.jar \
            --main-class com.ejemplo.holamundo.Main \
            --dest build/installers/linux \
            --description "Aplicación Hola Mundo en Java" \
            --vendor "Mi Empresa"

      - name: Crear instalador .sh (script universal — cualquier Linux)
        run: |
          # Crea un script autocontenido que descomprime y ejecuta la app
          mkdir -p build/installers/linux
          cat > build/installers/linux/instalar-holamundo.sh << 'EOF'
          #!/bin/bash
          # Instalador universal para Linux
          INSTALL_DIR="$HOME/.local/share/holamundo"
          mkdir -p "$INSTALL_DIR"
          cp holamundo-${VERSION}.jar "$INSTALL_DIR/"
          cat > "$HOME/.local/bin/holamundo" << 'LAUNCHER'
          #!/bin/bash
          java -jar "$HOME/.local/share/holamundo/holamundo-${VERSION}.jar"
          LAUNCHER
          chmod +x "$HOME/.local/bin/holamundo"
          echo "✅ Instalado. Ejecuta: holamundo"
          EOF
          chmod +x build/installers/linux/instalar-holamundo.sh

      - name: Crear paquete Snap (Ubuntu Snap Store)
        # snapcraft no está disponible via apt en GitHub Actions runners.
        # La action oficial de Snapcore instala snapcraft correctamente
        # y construye el .snap usando el fichero snap/snapcraft.yaml del repo.
        uses: snapcore/action-build@v1
        id: snap-build
        continue-on-error: true   # Si falla, el resto del build continúa igualmente

      - name: Mover .snap a la carpeta de instaladores
        if: steps.snap-build.outcome == 'success'
        run: |
          mkdir -p build/installers/linux
          mv *.snap build/installers/linux/ 2>/dev/null || true

      # Sube todos los instaladores como artefactos del workflow
      # Los encontrarás en la pestaña Actions → tu ejecución → Artifacts
      - name: Subir artefactos Linux
        uses: actions/upload-artifact@v4
        with:
          name: instaladores-linux
          path: build/installers/linux/

  # ──────────────────────────────────────────────────────────
  # 2) MACOS — genera .dmg y .pkg
  #    Se ejecuta en un runner macOS de GitHub
  # ──────────────────────────────────────────────────────────
  build-mac:
    runs-on: macos-latest

    steps:
      - name: Clonar el repositorio
        uses: actions/checkout@v4


      - name: Extraer versión del tag
        # Elimina la 'v' inicial: v1.2.3 → 1.2.3
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Instalar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Compilar y construir el JAR
        run: ./gradlew build

      - name: Crear instalador .dmg (imagen de disco — el más común en Mac)
        run: |
          jpackage \
            --type dmg \
            --name holamundo \
            --app-version ${{env.VERSION}} \
            --input build/libs \
            --main-jar holamundo-${{env.VERSION}}.jar \
            --main-class com.ejemplo.holamundo.Main \
            --dest build/installers/mac \
            --description "Aplicación Hola Mundo en Java" \
            --vendor "Mi Empresa" \
            --mac-package-name "Hola Mundo"

      - name: Crear instalador .pkg (paquete macOS — para distribución empresarial)
        run: |
          jpackage \
            --type pkg \
            --name holamundo \
            --app-version ${{env.VERSION}} \
            --input build/libs \
            --main-jar holamundo-${{env.VERSION}}.jar \
            --main-class com.ejemplo.holamundo.Main \
            --dest build/installers/mac \
            --description "Aplicación Hola Mundo en Java" \
            --vendor "Mi Empresa"

      - name: Subir artefactos Mac
        uses: actions/upload-artifact@v4
        with:
          name: instaladores-mac
          path: build/installers/mac/

  # ──────────────────────────────────────────────────────────
  # 3) WINDOWS — genera .exe y .msi
  #    Se ejecuta en un runner Windows de GitHub
  # ──────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Clonar el repositorio
        uses: actions/checkout@v4

      - name: Instalar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Compilar y construir el JAR
        run: .\gradlew.bat build

      - name: Instalar WiX Toolset (necesario para crear .msi)
        run: |
          # WiX es el estándar para crear instaladores .msi en Windows
          choco install wixtoolset -y
          echo "C:\Program Files (x86)\WiX Toolset v3.11\bin" >> $env:GITHUB_PATH

      - name: Crear instalador .exe (ejecutable de instalación)
        run: |
          jpackage `
            --type exe `
            --name holamundo `
            --app-version ${{env.VERSION}} `
            --input build\libs `
            --main-jar holamundo-${{env.VERSION}}.jar `
            --main-class com.ejemplo.holamundo.Main `
            --dest build\installers\windows `
            --description "Aplicación Hola Mundo en Java" `
            --vendor "Mi Empresa" `
            --win-shortcut `
            --win-menu `
            --win-menu-group "Mi Empresa"

      - name: Crear instalador .msi (Windows Installer — para empresas/GPO)
        run: |
          jpackage `
            --type msi `
            --name holamundo `
            --app-version ${{env.VERSION}} `
            --input build\libs `
            --main-jar holamundo-${{env.VERSION}}.jar `
            --main-class com.ejemplo.holamundo.Main `
            --dest build\installers\windows `
            --description "Aplicación Hola Mundo en Java" `
            --vendor "Mi Empresa" `
            --win-shortcut `
            --win-menu `
            --win-menu-group "Mi Empresa"

      - name: Subir artefactos Windows
        uses: actions/upload-artifact@v4
        with:
          name: instaladores-windows
          path: build\installers\windows\

  # ──────────────────────────────────────────────────────────
  # 4) RELEASE — publica todos los instaladores en GitHub Releases
  #    Solo se ejecuta cuando haces push de un tag (v*)
  # ──────────────────────────────────────────────────────────
  release:
    needs: [build-linux, build-mac, build-windows]  # Espera a que los 3 builds terminen
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')         # Solo en tags, no en PRs
    permissions:
      contents: write   # Necesario para crear releases y subir ficheros

    steps:
      - name: Descargar artefactos Linux
        uses: actions/download-artifact@v4
        with:
          name: instaladores-linux
          path: release/linux

      - name: Descargar artefactos Mac
        uses: actions/download-artifact@v4
        with:
          name: instaladores-mac
          path: release/mac

      - name: Descargar artefactos Windows
        uses: actions/download-artifact@v4
        with:
          name: instaladores-windows
          path: release/windows

      - name: Crear GitHub Release y subir instaladores
        uses: softprops/action-gh-release@v1
        with:
          name: "Hola Mundo ${{github.ref_name}}"
          body: |
            ## 🚀 Release ${{github.ref_name}}

            ### Descarga tu instalador:
            | Plataforma | Formato | Descripción |
            |------------|---------|-------------|
            | 🐧 Linux   | `.deb`  | Debian, Ubuntu, Mint |
            | 🐧 Linux   | `.rpm`  | Fedora, CentOS, RHEL |
            | 🐧 Linux   | `.sh`   | Cualquier distribución Linux |
            | 🍎 macOS   | `.dmg`  | Instalación visual arrastrando |
            | 🍎 macOS   | `.pkg`  | Instalación silenciosa/empresarial |
            | 🪟 Windows | `.exe`  | Instalador con asistente |
            | 🪟 Windows | `.msi`  | Instalación empresarial/GPO |
          files: |
            release/linux/*
            release/mac/*
            release/windows/*
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}  # Token automático de GitHub, no necesitas configurar nada
